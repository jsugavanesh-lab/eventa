<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Eventiva</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .coming-soon-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&q=80&w=2000') center/cover;
        }
    </style>
</head>
<body class="coming-soon-bg d-flex align-items-center justify-content-center min-vh-100 text-center text-white">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <a href="index.html" class="fw-bold fs-1 text-primary text-decoration-none mb-4 d-block">EVENTIVA</a>
                <h1 class="display-3 fw-bold mb-3">Something Extraordinary is <span class="text-primary">Coming Soon</span></h1>
                <p class="lead mb-5 opacity-75">We're working hard to bring you the best event experience. Stay tuned and subscribe to get notified when we launch!</p>
                
                <div class="row g-3 justify-content-center mb-5">
                    <div class="col-auto">
                        <div class="card bg-dark border-primary p-3" style="min-width: 100px;">
                            <h2 class="mb-0">15</h2>
                            <span class="small opacity-50">Days</span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <div class="card bg-dark border-primary p-3" style="min-width: 100px;">
                            <h2 class="mb-0">08</h2>
                            <span class="small opacity-50">Hours</span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <div class="card bg-dark border-primary p-3" style="min-width: 100px;">
                            <h2 class="mb-0">45</h2>
                            <span class="small opacity-50">Mins</span>
                        </div>
                    </div>
                </div>

                <form class="row g-3 justify-content-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <input type="email" class="form-control form-control-lg bg-transparent text-white border-primary" placeholder="Enter your email">
                            <button class="btn btn-primary px-4" type="button">Notify Me</button>
                        </div>
                    </div>
                </form>

                <div class="mt-5 d-flex justify-content-center gap-4">
                    <a href="#" class="text-white fs-4"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="text-white fs-4"><i class="bi bi-twitter-x"></i></a>
                    <a href="#" class="text-white fs-4"><i class="bi bi-instagram"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Toggle Fixed -->
    <div class="position-fixed top-0 end-0 p-3">
        <button id="themeToggle" class="theme-toggle">
            <i class="bi bi-sun-fill"></i>
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
